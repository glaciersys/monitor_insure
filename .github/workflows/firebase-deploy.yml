name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

concurrency:
  group: firebase-hosting-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: List files to deploy
        run: find . -not -path './.git/*' -not -path './node_modules/*' -type f | sort

      - name: Bump service worker cache version
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          sed -i "s/const CACHE_VERSION = '.*';/const CACHE_VERSION = 'monitor-insure-${SHORT_SHA}';/" sw.js
          echo "CACHE_VERSION set to monitor-insure-${SHORT_SHA}"
          grep CACHE_VERSION sw.js

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          projectId: insuresys-839eb
          channelId: live
