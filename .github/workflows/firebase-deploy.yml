name: Deploy to Firebase Hosting

# รันอัตโนมัติทุกครั้งที่ push เข้า branch main
# แต่จะหยุดรอ Approval ก่อน deploy จริง (Environment Protection)
on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: mndep   # ← ตรงนี้ทำให้ GitHub หยุดรอ Approve ก่อน deploy
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Bump service worker cache version
        run: node bump-version.js

      - name: Deploy to Firebase Hosting (live channel)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          projectId: insuresys-839eb
          channelId: live
